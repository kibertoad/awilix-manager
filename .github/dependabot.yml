version: 2
updates:
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: '@types/node'
    groups:
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'
    cooldown:
      default-days: 7
