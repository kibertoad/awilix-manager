---
name: zizmor

# Audits GitHub Actions workflows for security issues with zizmor.
# Findings are surfaced as inline workflow annotations on the pull
# request (GitHub renders up to 10 annotations per run). zizmor exits
# non-zero whenever it reports a finding, so any finding fails this
# check (make it a required status check to block merging).

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'

permissions: {}

jobs:
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest

    permissions:
      contents: read # checkout the repository

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          # Surface findings as inline PR annotations instead of
          # uploading them to code scanning.
          advanced-security: false
          annotations: true
