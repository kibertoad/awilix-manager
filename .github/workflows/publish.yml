---
name: publish

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions: {}

jobs:
  publish:
    if: github.event.pull_request.merged == true && (contains(github.event.pull_request.labels.*.name, 'patch') || contains(github.event.pull_request.labels.*.name, 'minor') || contains(github.event.pull_request.labels.*.name, 'major'))
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout Repository # zizmor: ignore[artipacked]
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Credentials are intentionally persisted: the release steps below
          # push the version-bump commit and tag back to the main branch.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          registry-url: 'https://registry.npmjs.org'
          # Caching is explicitly disabled for the release pipeline so every
          # published build installs from a clean store. 'cache' is left unset
          # and 'package-manager-cache: false' also turns off setup-node's
          # automatic caching (which defaults to enabled).
          package-manager-cache: false

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine version bump
        id: version
        run: |
          if ${{ contains(github.event.pull_request.labels.*.name, 'major') }}; then
            echo "bump=major" >> $GITHUB_OUTPUT
          elif ${{ contains(github.event.pull_request.labels.*.name, 'minor') }}; then
            echo "bump=minor" >> $GITHUB_OUTPUT
          else
            echo "bump=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        env:
          VERSION_BUMP: ${{ steps.version.outputs.bump }}
        run: |
          pnpm version "$VERSION_BUMP" --no-git-tag-version
          pnpm run lint:fix
          git add -A
          git commit -m "chore: release v$(node -p "require('./package.json').version")"
          git tag "v$(node -p "require('./package.json').version")"
          git push
          git push --tags

      - name: Build
        run: pnpm run build:release

      - name: Publish to npm
        # Published with the npm CLI (not pnpm) for its mature OIDC trusted
        # publishing support; npm ships with the Node.js setup above.
        run: npm publish --provenance --access public
